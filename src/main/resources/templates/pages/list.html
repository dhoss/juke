<!DOCTYPE HTML>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Juke - List Pages</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>
<body>
<h1>Pages</h1>
<ul>
    <li th:each="page : ${pages}"><a th:text="${page.title}" th:href="@{/{slug}(slug=${page.slug})}"></a></li>
</ul>
</body>
</html>
